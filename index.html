<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini System | Loader</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #050507; color: white;
            display: flex; justify-content: center; align-items: center;
            font-family: 'Inter', sans-serif;
        }
        #status { text-align: center; }
        .spinner {
            width: 40px; height: 40px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="status">
        <div class="spinner"></div>
        <p>REBOOTING INTERFACE...</p>
    </div>

    <script>
        async function loadProject() {
            // Replace this with your actual main repository index or games page link
            const sourceURL = 'https://cdn.jsdelivr.net/gh/exoticstecvr/Gemini-Games@main/games.html';

            try {
                const response = await fetch(sourceURL);
                if (!response.ok) throw new Error('Source blocked');
                
                const html = await response.text();

                // Clear the loader and inject the project
                document.open();
                document.write(html);
                document.close();

            } catch (error) {
                document.getElementById('status').innerHTML = `
                    <h2 style="color: #ff4444;">CONNECTION FAILURE</h2>
                    <p>The firewall is blocking the fetch request to the repository.</p>
                `;
                console.error('Fetch error:', error);
            }
        }

        // Start the fetch immediately
        loadProject();
    </script>
</body>
</html>
