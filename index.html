<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini System</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
    </style>
</head>
<body>

    <script>
        async function loadRemoteSite() {
            // Path to the index.html in your clone54321 repo via jsDelivr
            const target = 'https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/index.html';

            try {
                const response = await fetch(target);
                if (!response.ok) throw new Error('Fetch failed');
                const html = await response.text();

                // The <base> tag ensures images/scripts inside the fetched 
                // code still load from the original GitHub repository.
                const baseTag = `<base href="https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/">`;

                document.open();
                document.write(baseTag + html);
                document.close();
            } catch (err) {
                console.error("Error loading site:", err);
                // Fallback: If fetch is blocked, try to load it as a direct iframe
                document.body.innerHTML = `<iframe src="https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/index.html" style="width:100%;height:100%;border:none;"></iframe>`;
            }
        }

        loadRemoteSite();
    </script>
</body>
</html>
