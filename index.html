<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gemini | Bootloader</title>
    <style>
        body { background: #000; color: #333; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .dot { width: 4px; height: 4px; background: #111; border-radius: 50%; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 0; } 50% { opacity: 1; } }
    </style>
</head>
<body>
    <div class="dot"></div>

    <script>
        async function initGemini() {
            // Back to the standard link without the ?v= date string
            const target = 'https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/index.html';

            try {
                // 1. Fetch the code
                const response = await fetch(target);
                if (!response.ok) throw new Error();
                const html = await response.text();

                // 2. JavaScript Popup Prompt
                const proceed = confirm("Ready to Execute Gemini?");

                if (proceed) {
                    // 3. Prepare the code with the Base Tag
                    const baseTag = `<base href="https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/index.html">`;
                    const fullCode = baseTag + html;

                    // 4. Create a Blob (virtual file)
                    const blob = new Blob([fullCode], { type: 'text/html' });
                    const blobUrl = URL.createObjectURL(blob);

                    // 5. Open in a new about:blank tab
                    const newWin = window.open('about:blank', '_blank');
                    
                    if (newWin) {
                        newWin.location.href = blobUrl;
                    } else {
                        alert("Popup blocked! Please allow popups for this site.");
                    }
                }
            } catch (err) {
                console.error("Execution failed.");
            }
        }

        window.onload = initGemini;
    </script>
</body>
</html>
