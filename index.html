<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini System | Interface</title>
    <style>
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: #000; overflow: hidden; 
        }
    </style>
</head>
<body>

    <script>
        async function catchAndRun() {
            // Path to your clone54321 repo index file
            const target = 'https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/index.html';

            try {
                const response = await fetch(target);
                if (!response.ok) throw new Error('Blocked');
                const html = await response.text();

                // This is crucial: It redirects all relative links 
                // inside your fetched HTML to point to your GitHub files.
                const baseTag = `<base href="https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/">`;

                document.open();
                // Inject the base tag and the fetched content
                document.write(baseTag + html);
                document.close();
            } catch (err) {
                // If the direct fetch fails, use the Iframe fallback
                document.body.innerHTML = `
                    <iframe src="https://cdn.jsdelivr.net/gh/exoticstecvr/clone54321@main/index.html" 
                            style="width:100%;height:100%;border:none;">
                    </iframe>`;
            }
        }

        catchAndRun();
    </script>
</body>
</html>
